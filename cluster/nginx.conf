# AUTO-GENERATED by cluster.sh — edits are overwritten on `up`/`gen`.
worker_processes auto;
events { worker_connections 4096; }

http {
    access_log off;
    upstream scraper_pool {
    ip_hash;
        server scraper-1:8092 max_fails=3 fail_timeout=15s;
        server scraper-2:8092 max_fails=3 fail_timeout=15s;
        server scraper-3:8092 max_fails=3 fail_timeout=15s;
        keepalive 64;
    }

    # SSE-friendly proxy: no buffering, long read timeout, HTTP/1.1 keepalive.
    server {
        listen 80;
        client_max_body_size 25m;

        # LB-level liveness — returns 200 without hitting a replica.
        location = /lb-health { return 200 "lb ok\n"; }

        location / {
            proxy_pass http://scraper_pool;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection "";

            # Server-Sent Events (/api/runs/:id/events) must stream live.
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }
    }
}

# AUTO-GENERATED by cluster.sh (REPLICAS=3) — do not hand-edit.
# Each scraper-N has an ISOLATED storage dir (Chromium profile); runs/ +
# ai-cache/ are shared. nginx `lb` fronts them on host port 8092.

services:
  scraper-1:
    image: flashfire-scraper:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashfire-cluster-scraper-1
    expose:
      - "8092"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8092
      - STORAGE_DIR=/app/storage
      - RUNS_DIR=/app/runs
      - AI_CACHE_DIR=/app/ai-cache
      - JDFETCH_CACHE_DIR=/app/jd-cache
      - HEADLESS=true
      - REPLICA_ID=1
    env_file:
      - .env
    volumes:
      - ./cluster/storage-1:/app/storage
      - ./runs:/app/runs
      - ./ai-cache:/app/ai-cache
      - ./jd-cache:/app/jd-cache
    restart: always
    stop_grace_period: 30s
    shm_size: 1gb
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8092/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    deploy:
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 512M }

  scraper-2:
    image: flashfire-scraper:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashfire-cluster-scraper-2
    expose:
      - "8092"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8092
      - STORAGE_DIR=/app/storage
      - RUNS_DIR=/app/runs
      - AI_CACHE_DIR=/app/ai-cache
      - JDFETCH_CACHE_DIR=/app/jd-cache
      - HEADLESS=true
      - REPLICA_ID=2
    env_file:
      - .env
    volumes:
      - ./cluster/storage-2:/app/storage
      - ./runs:/app/runs
      - ./ai-cache:/app/ai-cache
      - ./jd-cache:/app/jd-cache
    restart: always
    stop_grace_period: 30s
    shm_size: 1gb
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8092/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    deploy:
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 512M }

  scraper-3:
    image: flashfire-scraper:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flashfire-cluster-scraper-3
    expose:
      - "8092"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=8092
      - STORAGE_DIR=/app/storage
      - RUNS_DIR=/app/runs
      - AI_CACHE_DIR=/app/ai-cache
      - JDFETCH_CACHE_DIR=/app/jd-cache
      - HEADLESS=true
      - REPLICA_ID=3
    env_file:
      - .env
    volumes:
      - ./cluster/storage-3:/app/storage
      - ./runs:/app/runs
      - ./ai-cache:/app/ai-cache
      - ./jd-cache:/app/jd-cache
    restart: always
    stop_grace_period: 30s
    shm_size: 1gb
    security_opt:
      - seccomp:unconfined
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8092/api/health"]
      interval: 30s

    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "5" }
    deploy:
      resources:
        limits: { memory: 2048M }
        reservations: { memory: 512M }

  lb:
    image: nginx:1.27-alpine
    container_name: flashfire-cluster-lb
    ports:
      - "8092:80"
    volumes:
      - ./cluster/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      scraper-1:
        condition: service_healthy
      scraper-2:
        condition: service_healthy
      scraper-3:
        condition: service_healthy
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/lb-health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: json-file
      options: { max-size: "20m", max-file: "3" }

networks:
  default:
    name: flashfire-cluster-network
